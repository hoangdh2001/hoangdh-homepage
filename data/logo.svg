<svg width="54" height="54" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: transparent -->

  <!-- Head -->
  <rect x="56" y="160" rx="80" ry="80" width="400" height="240"
        fill="url(#grad)" />

  <!-- Eyes -->
  <circle cx="196" cy="280" r="28" fill="#111"/>
  <circle cx="316" cy="280" r="28" fill="#111"/>

  <!-- Antenna -->
  <rect x="236" y="100" width="40" height="80" rx="20" fill="url(#grad)"/>
  <rect x="226" y="60" width="60" height="60" rx="20" fill="url(#grad)"/>

  <!-- Gradient (Swift-style orange) -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a3d"/>
      <stop offset="50%" style="stop-color:#ff5e1a"/>
      <stop offset="100%" style="stop-color:#ff3b0a"/>
    </linearGradient>
  </defs>
</svg>